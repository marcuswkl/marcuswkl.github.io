name: Build and deploy Next.js site to GitHub Pages

on:
  push:
    branches: ['main']
  # Allow to run manually
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: latest
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # Remove this line if managing custom configuration.
          static_site_generator: next
      - name: Cache
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-bun-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-bun-nextjs-${{ hashFiles('**/bun.lock') }}-
      - name: Install dependencies
        run: bun install
      - name: Build with Next.js
        run: bun run build
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4.0.5
